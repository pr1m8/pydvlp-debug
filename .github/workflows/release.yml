name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pdm install

      - name: Run tests
        run: pdm run pytest --cov=pydvlp --cov-fail-under=90

      - name: Build package
        run: pdm build

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/pydvlp-debug
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: dist
          path: dist/

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          name: Release ${{ steps.version.outputs.version }}
          generate_release_notes: true

  trigger-docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    needs: [publish-pypi]
    steps:
      - name: Trigger RTD build
        if: secrets.RTD_WEBHOOK_URL
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"branches": ["main"]}' \
            "${{ secrets.RTD_WEBHOOK_URL }}"
        continue-on-error: true

      - name: Documentation notice
        run: |
          echo "📚 Documentation will be updated at:"
          echo "   https://pydvlp-debug.readthedocs.io/"