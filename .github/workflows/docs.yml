name: Documentation

on:
  push:
    branches: [main]
    tags:
      - 'v*'  # Build docs for version tags
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.readthedocs.yml'
      - 'src/**/*.py'  # For API docs
      - 'README.md'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.readthedocs.yml'
      - 'src/**/*.py'
      - 'README.md'
  release:
    types: [published, prereleased]

jobs:
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv pip install --system -r docs/requirements.txt

      - name: Validate MkDocs config
        run: |
          mkdocs --version
          python -c "import yaml; yaml.safe_load(open('mkdocs.yml'))"
          echo "✅ MkDocs configuration is valid"

      - name: Build documentation locally
        run: |
          mkdocs build --strict
          echo "✅ Documentation builds successfully"

      - name: Check documentation files
        run: |
          echo "📊 Documentation overview:"
          echo "- Config file: mkdocs.yml ✅"
          echo "- RTD config: .readthedocs.yml ✅"
          echo "- Requirements: docs/requirements.txt ✅"
          echo "- Site built: site/ directory ✅"
          
          echo ""
          echo "📝 Generated pages:"
          find site -name "*.html" | head -10
          
          if [ -f site/index.html ]; then
            echo "✅ Main index page generated"
          else
            echo "❌ Main index page missing"
            exit 1
          fi

  deploy-rtd:
    name: Deploy to Read the Docs
    runs-on: ubuntu-latest
    needs: validate-docs
    if: github.event_name == 'push' || github.event_name == 'release'
    steps:
      - name: Determine deployment target
        id: target
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            echo "deploy_ref=$TAG" >> $GITHUB_OUTPUT
            echo "deploy_type=tag" >> $GITHUB_OUTPUT
            echo "Deploying docs for tag: $TAG"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            echo "deploy_ref=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
            echo "deploy_type=release" >> $GITHUB_OUTPUT
            echo "Deploying docs for release: ${{ github.event.release.tag_name }}"
          else
            echo "deploy_ref=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "deploy_type=branch" >> $GITHUB_OUTPUT
            echo "Deploying docs for branch: ${{ github.ref_name }}"
          fi

      - name: Trigger RTD Webhook
        if: secrets.RTD_WEBHOOK_URL && secrets.RTD_WEBHOOK_TOKEN
        run: |
          echo "🔔 Triggering RTD build for: ${{ steps.target.outputs.deploy_ref }}"
          
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"branches\": [\"${{ steps.target.outputs.deploy_ref }}\"], \"token\": \"${{ secrets.RTD_WEBHOOK_TOKEN }}\"}" \
            "${{ secrets.RTD_WEBHOOK_URL }}"
          
          # For version releases, also update latest
          if [[ "${{ steps.target.outputs.deploy_type }}" == "tag" || "${{ steps.target.outputs.deploy_type }}" == "release" ]]; then
            echo "🔄 Also updating latest docs from main branch"
            curl -X POST \
              -H "Content-Type: application/json" \
              -d "{\"branches\": [\"main\"], \"token\": \"${{ secrets.RTD_WEBHOOK_TOKEN }}\"}" \
              "${{ secrets.RTD_WEBHOOK_URL }}"
          fi
          
          echo "✅ Read the Docs build triggered"
        continue-on-error: true

      - name: RTD Setup Instructions
        if: '!secrets.RTD_WEBHOOK_URL'
        run: |
          echo "📚 Read the Docs Setup Instructions"
          echo "===================================="
          echo ""
          echo "Your documentation is ready to deploy! To set up automatic builds:"
          echo ""
          echo "1. 🌐 Go to https://readthedocs.org/dashboard/"
          echo "2. 🔐 Sign in with your GitHub account" 
          echo "3. 📥 Click 'Import a Project'"
          echo "4. 🎯 Select 'pydvlp-debug' repository"
          echo "5. ⚙️  RTD will use .readthedocs.yml automatically"
          echo "6. 🔗 Go to Admin > Integrations to get webhook details"
          echo "7. 🔐 Add secrets to GitHub repository:"
          echo "   - RTD_WEBHOOK_URL"
          echo "   - RTD_WEBHOOK_TOKEN"
          echo ""
          echo "🌐 After setup, your docs will be available at:"
          echo "   - Latest: https://pydvlp-debug.readthedocs.io/en/latest/"
          if [[ "${{ steps.target.outputs.deploy_type }}" == "tag" || "${{ steps.target.outputs.deploy_type }}" == "release" ]]; then
            echo "   - Version: https://pydvlp-debug.readthedocs.io/en/${{ steps.target.outputs.deploy_ref }}/"
          fi