name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.readthedocs.yml'
      - 'src/**/*.py'  # For API docs
      - 'README.md'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.readthedocs.yml'
      - 'src/**/*.py'
      - 'README.md'

jobs:
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv pip install --system -r docs/requirements.txt

      - name: Validate MkDocs config
        run: |
          mkdocs --version
          python -c "import yaml; yaml.safe_load(open('mkdocs.yml'))"
          echo "✅ MkDocs configuration is valid"

      - name: Build documentation locally
        run: |
          mkdocs build --strict
          echo "✅ Documentation builds successfully"

      - name: Check documentation files
        run: |
          echo "📊 Documentation overview:"
          echo "- Config file: mkdocs.yml ✅"
          echo "- RTD config: .readthedocs.yml ✅"
          echo "- Requirements: docs/requirements.txt ✅"
          echo "- Site built: site/ directory ✅"
          
          echo ""
          echo "📝 Generated pages:"
          find site -name "*.html" | head -10
          
          if [ -f site/index.html ]; then
            echo "✅ Main index page generated"
          else
            echo "❌ Main index page missing"
            exit 1
          fi

  deploy-rtd:
    name: Deploy to Read the Docs
    runs-on: ubuntu-latest
    needs: validate-docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger RTD Webhook
        if: secrets.RTD_WEBHOOK_URL != ''
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"branches": ["main"]}' \
            "${{ secrets.RTD_WEBHOOK_URL }}"
          echo "✅ Read the Docs build triggered"
        continue-on-error: true

      - name: RTD Setup Instructions
        if: secrets.RTD_WEBHOOK_URL == ''
        run: |
          echo "📚 Read the Docs Setup Instructions:"
          echo ""
          echo "1. Go to https://readthedocs.org/dashboard/"
          echo "2. Sign in with your GitHub account" 
          echo "3. Click 'Import a Project'"
          echo "4. Select 'pydvlp-debug' repository"
          echo "5. Read the Docs will use .readthedocs.yml automatically"
          echo ""
          echo "🌐 Your docs will be available at:"
          echo "   https://pydvlp-debug.readthedocs.io/"
          echo ""
          echo "⚙️  Optional: Set RTD_WEBHOOK_URL secret for auto-deployment"