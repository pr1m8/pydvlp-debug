site_name: PyDvlp Debug
site_description: Professional Python Development Utilities
site_author: William R. Astley
site_url: https://pydvlp-debug.readthedocs.io/
repo_url: https://github.com/pr1m8/pydvlp-debug
repo_name: pydvlp-debug
use_directory_urls: true
copyright: Copyright &copy; 2024 William R. Astley

# Configuration
theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.instant
    - navigation.prune
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - toc.follow

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
      title: Page Contents
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: pr1m8
      repo: pydvlp-debug
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg


plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - autorefs

# Navigation
nav:
  - Home: index.md
  - Getting Started:
      - guides/getting-started.md
      - guides/configuration.md
      - guides/best-practices.md
  - API Reference:
      - api/index.md
      - api/core.md
      - api/debugging.md
      - api/profiling.md
      - api/analysis.md
  - Contributing: CONTRIBUTING.md
  - Changelog: CHANGELOG.md

# Extra
extra:
  version:
    provider: mike
    default: stable
  analytics:
    provider: google
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pr1m8/pydvlp-debug
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pydvlp-debug/
    - icon: fontawesome/solid/globe
      link: https://willastley.dev
  status:
    new: Recently added
    deprecated: Deprecated

